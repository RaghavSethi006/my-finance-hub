name: Build Installers

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: Create a draft GitHub Release and attach installers
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      release_tag:
        description: Release tag to use when creating a release
        required: false
        default: "aurum-v__VERSION__"
      release_name:
        description: Release title to use when creating a release
        required: false
        default: "Aurum v__VERSION__"

permissions:
  contents: write

jobs:
  build-tauri:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows installer
            platform: windows-latest
            args: ""
            artifact: windows
          - label: macOS Apple Silicon DMG
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            artifact: macos-aarch64
          - label: macOS Intel DMG
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
            artifact: macos-x86_64
          - label: Linux bundles
            platform: ubuntu-22.04
            args: ""
            artifact: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build installers as workflow artifacts
        id: build-artifacts
        if: inputs.create_release != 'true'
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          args: ${{ matrix.args }}

      - name: Upload installer artifacts
        if: inputs.create_release != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Aurum-${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: error

      - name: Build installers and draft release
        if: inputs.create_release == 'true'
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
          releaseDraft: true
          prerelease: false
          assetNamePattern: "Aurum-[version]-[platform]-[arch]-[bundle][setup][ext]"
          tagName: ${{ inputs.release_tag }}
          releaseName: ${{ inputs.release_name }}
          releaseBody: |
            ## Aurum Desktop

            Aurum is a private, local-first desktop workspace for managing your financial life across transactions, accounts, assets, documents, and tax planning. This release includes signed build artifacts generated from commit `${{ github.sha }}`.

            ## What's Included

            - Native desktop installers for Windows, macOS, and Linux.
            - The Aurum rebrand with updated application metadata, icons, and interface copy.
            - Bank statement import for CSV, TXT, and PDF files, including OCR fallback for scanned statements.
            - Live market price sync and timestamped asset value history for trackable holdings.
            - Encrypted desktop backup export and restore support for local snapshots and vault files.
            - Installer automation through GitHub Actions for repeatable desktop builds.

            ## Downloads

            Choose the installer that matches your operating system and CPU architecture from the assets attached to this draft release.

            - Windows: use the `.msi` or setup executable.
            - macOS Apple Silicon: use the `aarch64` DMG.
            - macOS Intel: use the `x86_64` DMG.
            - Linux: use the AppImage, Debian package, or RPM package if available.

            ## Notes

            Aurum stores financial data locally on your machine. No cloud account or third-party sync is required for the core desktop app. Keep a separate encrypted backup before upgrading if you already have important local data.

            ## Verification

            These installers were built by the `Build Installers` GitHub Actions workflow from `${{ github.repository }}` at `${{ github.sha }}`.
